<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SyncNPlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 4px;
      color: #fff;
    }

    p.subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #create-btn {
      background: #ff0000;
      color: #fff;
    }

    #create-btn:hover { background: #cc0000; }

    #join-btn {
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }

    #join-btn:hover { background: #333; }

    input {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }

    #room-code {
      font-size: 13px;
      text-align: center;
      color: #ff0000;
      font-weight: bold;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h1>🎬 SyncNPlay</h1>
  <p class="subtitle">Sync video across platforms</p>

  <button id="create-btn">Create Room</button>

  <hr class="divider" />

  <input type="text" id="room-input" placeholder="Enter room code" maxlength="6" />
  <button id="join-btn">Join Room</button>

  <div id="status"></div>
  <div id="room-code"></div>

  <script src="popup.js"></script>
</body>
</html>
